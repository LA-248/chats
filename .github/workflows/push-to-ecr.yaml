name: Push to ECR

run-name: Build and push image to ECR

on:
  push:
    branches:
      - main
jobs:  
  increment-server-tag:
    runs-on: ubuntu-latest

    outputs:
      latest_server_tag: ${{ steps.tag.outputs.next_server_tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: tag 
        run: |
          latest_server_tag=$(git tag --list 'server-v*' --sort=-v:refname | head -n 1)

          if [ -z "$latest_server_tag" ]; then
            next_tag="server-v1.0.0"
          else
            version="${latest_server_tag#server-v}"
            major=$(echo "$version" | cut -d. -f1)
            minor=$(echo "$version" | cut -d. -f2)
            patch=$(echo "$version" | cut -d. -f3)

            patch=$((patch + 1))
            next_server_tag="server-v$major.$minor.$patch"
          fi

          git tag $next_tag
          git push origin $next_tag
          echo "next_server_tag=$next_tag" >> "$GITHUB_OUTPUT"

  increment-client-tag:
    runs-on: ubuntu-latest

    outputs:
      latest_client_tag: ${{ steps.tag.outputs.next_client_tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: tag 
        run: |
          latest_client_tag=$(git tag --list 'client-v*' --sort=-v:refname | head -n 1)

          if [ -z "$latest_client_tag" ]; then
            next_tag="client-v1.0.0"
          else
            version="${latest_client_tag#client-v}"
            major=$(echo "$version" | cut -d. -f1)
            minor=$(echo "$version" | cut -d. -f2)
            patch=$(echo "$version" | cut -d. -f3)

            patch=$((patch + 1))
            next_client_tag="client-v$major.$minor.$patch"
          fi

          git tag $next_tag
          git push origin $next_tag
          echo "next_client_tag=$next_tag" >> "$GITHUB_OUTPUT"
  
  build-server:
    runs-on: ubuntu-latest
    needs: increment-server-tag
    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22.20'
      - run: npm ci
      - run: npm run build

  build-client:
    runs-on: ubuntu-latest
    needs: increment-client-tag
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22.20'
      - run: npm ci
      - run: npm run build
      
# STEPS
# Get ECR repos for frontend and backend (public.ecr.aws/v4w2k2g6/chats/frontend, public.ecr.aws/v4w2k2g6/chats/backend)
# Rebuild Docker image and push it to ECR using the same tag (:latest)
